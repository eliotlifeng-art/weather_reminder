name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool libtool-bin pkg-config zlib1g-dev \
            libncurses-dev libncursesw6 libtinfo6 \
            cmake libffi-dev libssl-dev liblzma-dev
          echo 'AC_DEFUN([LT_SYS_SYMBOL_USCORE], [false])' | sudo tee /usr/share/aclocal/lt_sys_symbol_uscore.m4
          ls /usr/share/aclocal/libtool.m4 && echo "libtool.m4 found"
          grep -c "LT_SYS_SYMBOL_USCORE" /usr/share/aclocal/lt_sys_symbol_uscore.m4 && echo "stub macro installed"

      - name: Install Buildozer and dependencies
        run: |
          pip install buildozer==1.6.0 cython==0.29.37 kivy==2.2.1 kivymd==1.1.1 requests plyer

      - name: Build debug APK (first attempt - downloads SDK)
        id: build1
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          buildozer android debug || true
        timeout-minutes: 15

      - name: Accept SDK licenses and install build-tools
        run: |
          SDKMANAGER=$(find ~/.buildozer -name "sdkmanager" -type f 2>/dev/null | head -1)
          echo "Found sdkmanager: $SDKMANAGER"
          if [ -n "$SDKMANAGER" ]; then
            SDK_ROOT=$(dirname $(dirname $(dirname "$SDKMANAGER")))
            echo "SDK root: $SDK_ROOT"
            yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" --licenses || true
            "$SDKMANAGER" --sdk_root="$SDK_ROOT" "platform-tools" "build-tools;33.0.1" || true
            ls -la "$SDK_ROOT/build-tools/" || true
          fi

      - name: Build debug APK (second attempt - with license accepted)
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          export ACLOCAL_PATH="/usr/share/aclocal"
          buildozer android debug
        timeout-minutes: 60

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: weather-reminder-apk
          path: bin/*.apk
          retention-days: 30
