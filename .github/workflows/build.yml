name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses-dev libncursesw6 libtinfo6 \
            cmake libffi-dev libssl-dev \
            || sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            cmake libffi-dev libssl-dev

      - name: Install Buildozer and dependencies
        run: |
          pip install buildozer==1.6.0 cython==0.29.37 kivy==2.2.1 kivymd==1.1.1 requests plyer

      - name: Initialize Buildozer
        run: |
          buildozer init || true

      - name: Build debug APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools
          buildozer android debug || {
            echo "=== First build failed, installing build-tools ==="
            SDKMANAGER=$(find ~/.buildozer -name "sdkmanager" -type f 2>/dev/null | head -1)
            if [ -n "$SDKMANAGER" ]; then
              SDK_ROOT=$(dirname $(dirname $(dirname "$SDKMANAGER")))
              yes | "$SDKMANAGER" --sdk_root="$SDK_ROOT" "build-tools;33.0.0" "platforms;android-33"
              echo "=== Retrying build ==="
              buildozer android debug
            else
              echo "sdkmanager not found"
              exit 1
            fi
          }
        timeout-minutes: 60

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: weather-reminder-apk
          path: bin/*.apk
          retention-days: 30
