name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool libtool-bin pkg-config zlib1g-dev \
            libncurses-dev libncursesw6 libtinfo6 \
            cmake libffi-dev libssl-dev

      - name: Install Buildozer and dependencies
        run: |
          pip install buildozer==1.6.0 cython==0.29.37 kivy==2.2.1 kivymd==1.1.1 requests plyer

      - name: Initialize Buildozer
        run: |
          buildozer init || true

      - name: Set up Android SDK for Buildozer
        run: |
          SYSTEM_SDK=/usr/local/lib/android/sdk
          BUILD_SDK=~/.buildozer/android/platform/android-sdk
          mkdir -p $BUILD_SDK
          ln -sf $SYSTEM_SDK/platforms $BUILD_SDK/platforms
          ln -sf $SYSTEM_SDK/build-tools $BUILD_SDK/build-tools
          mkdir -p $BUILD_SDK/tools/bin
          ln -sf $SYSTEM_SDK/cmdline-tools/latest/bin/sdkmanager $BUILD_SDK/tools/bin/sdkmanager
          ln -sf $SYSTEM_SDK/cmdline-tools/latest/bin/avdmanager $BUILD_SDK/tools/bin/avdmanager
          echo "=== SDK structure ==="
          ls -la $BUILD_SDK/
          ls -la $BUILD_SDK/tools/bin/
          ls -la $BUILD_SDK/build-tools/

      - name: Build debug APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          export ANDROIDSDK=/usr/local/lib/android/sdk
          export ANDROID_HOME=/usr/local/lib/android/sdk
          buildozer android debug
        timeout-minutes: 60

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: weather-reminder-apk
          path: bin/*.apk
          retention-days: 30
